image: node:20

pipelines:
  branches:
    dev:
      - step:
          name: Build & Deploy Staging
          caches:
            - node
          script:
            # 0) 啟用 corepack，使用 pnpm（Node 20 內建）
            - corepack enable
            - corepack prepare pnpm@8 --activate

            # 1) 安裝 & 建置（用 pnpm 並鎖定 lockfile）
            - pnpm install --frozen-lockfile
            - pnpm build

            # 2) 安裝 AWS CLI
            - apt-get update && apt-get install -y python3-pip && pip3 install awscli

            # 3) 設定 AWS 憑證
            - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
            - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
            - aws configure set default.region $AWS_REGION

            # 4) 部署到 S3（資源長快取、index.html 不快取）
            - aws s3 sync dist/ s3://$S3_BUCKET_STAGING --delete --cache-control "public, max-age=31536000" --exclude "index.html"
            - aws s3 cp dist/index.html s3://$S3_BUCKET_STAGING/index.html --cache-control "no-store"

            # 5) CloudFront 失效
            - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID_STAGING --paths "/*"
